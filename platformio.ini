[env:xiaoblesense_adafruit]

platform = https://github.com/maxgerhardt/platform-nordicnrf52
board = xiaoblesense_adafruit
framework = arduino
monitor_speed = 115200

lib_deps = 
    seeed-studio/Seeed Arduino LSM6DS3 @ ^2.0.3
    kosme/arduinoFFT @ ^1.6.0